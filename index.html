<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>운명의 케첩 야바위</title>
    <style>
        :root {
            --primary-red: #d32f2f;
            --accent-orange: #ff9800;
            --bg-dark: #1a1a1a;
            --text-light: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--bg-dark);
            font-family: 'Pretendard', sans-serif;
            color: var(--text-light);
            overflow: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
            z-index: 10;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0;
            color: var(--primary-red);
            text-shadow: 0 0 20px rgba(211, 47, 47, 0.5);
        }

        #status {
            font-size: 1.2rem;
            margin-top: 10px;
            height: 1.5em;
            color: #aaa;
        }

        .game-container {
            position: relative;
            width: 600px;
            height: 300px;
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            padding-bottom: 50px;
        }

        /* 컵 스타일 */
        .cup-wrapper {
            position: absolute;
            bottom: 50px;
            width: 120px;
            height: 160px;
            cursor: pointer;
            transition: transform 0.3s ease;
            z-index: 5;
        }

        .cup {
            position: relative;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #fbc02d 0%, #f9a825 100%);
            border-radius: 60px 60px 15px 15px;
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.2), 
                        0 10px 20px rgba(0,0,0,0.4);
            z-index: 2;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .cup::after {
            content: '';
            position: absolute;
            top: 20px;
            left: 15%;
            width: 70%;
            height: 15px;
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
        }

        /* 케첩 스타일 */
        .ketchup {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 80px;
            background: #d32f2f;
            border-radius: 8px 8px 4px 4px;
            display: none;
            z-index: 1;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .ketchup::before {
            content: 'TOMATO';
            position: absolute;
            top: 30px;
            width: 100%;
            text-align: center;
            font-size: 8px;
            font-weight: bold;
            color: white;
        }

        .ketchup-cap {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 15px;
            background: #fff;
            border-radius: 3px;
        }

        /* 제어 버튼 */
        .controls {
            margin-top: 50px;
            z-index: 10;
        }

        button {
            background-color: var(--primary-red);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(211, 47, 47, 0.4);
        }

        button:hover {
            background-color: #f44336;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(211, 47, 47, 0.6);
        }

        button:active {
            transform: translateY(1px);
        }

        button:disabled {
            background-color: #444;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* 결과 메시지 박스 */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background: #222;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid var(--primary-red);
        }

        .modal-content h2 {
            font-size: 2rem;
            margin-top: 0;
        }

        .modal-content button {
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🍅 KETCHUP SHUFFLE 🍅</h1>
        <div id="status">행운을 빌어요!</div>
    </div>

    <div class="game-container" id="game-container">
        <!-- 컵 1 -->
        <div class="cup-wrapper" id="wrapper-0" style="left: 50px;" onclick="handleCupClick(0)">
            <div class="ketchup" id="ketchup-0"><div class="ketchup-cap"></div></div>
            <div class="cup" id="cup-0"></div>
        </div>
        <!-- 컵 2 -->
        <div class="cup-wrapper" id="wrapper-1" style="left: 240px;" onclick="handleCupClick(1)">
            <div class="ketchup" id="ketchup-1"><div class="ketchup-cap"></div></div>
            <div class="cup" id="cup-1"></div>
        </div>
        <!-- 컵 3 -->
        <div class="cup-wrapper" id="wrapper-2" style="left: 430px;" onclick="handleCupClick(2)">
            <div class="ketchup" id="ketchup-2"><div class="ketchup-cap"></div></div>
            <div class="cup" id="cup-2"></div>
        </div>
    </div>

    <div class="controls">
        <button id="start-btn" onclick="initGame()">게임 시작!</button>
    </div>

    <div class="modal" id="result-modal">
        <div class="modal-content">
            <h2 id="result-title">결과</h2>
            <p id="result-text"></p>
            <button onclick="closeModal()">다시 하기</button>
        </div>
    </div>

    <script>
        let ketchupIndex = 1;
        let isMoving = false;
        let gameActive = false;
        let currentPositions = [0, 1, 2]; // 각 래퍼가 위치한 인덱스 (0:왼쪽, 1:가운데, 2:오른쪽)
        const leftCoords = [50, 240, 430];

        function setStatus(msg, color = "#aaa") {
            const status = document.getElementById('status');
            status.innerText = msg;
            status.style.color = color;
        }

        async function initGame() {
            if (isMoving) return;
            gameActive = false;
            document.getElementById('start-btn').disabled = true;
            
            // 초기화: 컵 내리기 및 케첩 숨기기
            resetCups();
            
            // 1. 케첩 위치 정하기
            ketchupIndex = Math.floor(Math.random() * 3);
            
            // 2. 케첩 먼저 보여주기
            setStatus("케첩 위치를 기억하세요!");
            await liftCup(ketchupIndex, true);
            await sleep(1000);
            await liftCup(ketchupIndex, false);
            await sleep(500);

            // 3. 섞기 시작
            setStatus("섞는 중...");
            await startShuffle();

            setStatus("케첩이 든 컵을 고르세요!", "#ff9800");
            gameActive = true;
            document.getElementById('start-btn').disabled = false;
        }

        function resetCups() {
            for(let i=0; i<3; i++) {
                document.getElementById(`cup-${i}`).style.transform = "translateY(0)";
                document.getElementById(`ketchup-${i}`).style.display = "none";
            }
        }

        function liftCup(index, isUp) {
            return new Promise(resolve => {
                const cup = document.getElementById(`cup-${index}`);
                const ketchup = document.getElementById(`ketchup-${index}`);
                
                if (isUp) {
                    ketchup.style.display = "block";
                    cup.style.transform = "translateY(-120px)";
                } else {
                    cup.style.transform = "translateY(0)";
                }
                
                setTimeout(resolve, 600);
            });
        }

        async function startShuffle() {
            isMoving = true;
            const shuffleCount = 12;
            
            for (let i = 0; i < shuffleCount; i++) {
                // 서로 다른 두 위치 선택
                let posA = Math.floor(Math.random() * 3);
                let posB = Math.floor(Math.random() * 3);
                while (posA === posB) posB = Math.floor(Math.random() * 3);

                await swapCups(posA, posB);
            }
            isMoving = false;
        }

        function swapCups(posA, posB) {
            return new Promise(resolve => {
                // 해당 위치에 있는 wrapper 찾기
                const idA = currentPositions.indexOf(posA);
                const idB = currentPositions.indexOf(posB);

                const wrapA = document.getElementById(`wrapper-${idA}`);
                const wrapB = document.getElementById(`wrapper-${idB}`);

                // 위치 교환 애니메이션
                wrapA.style.transition = "all 0.4s cubic-bezier(0.45, 0.05, 0.55, 0.95)";
                wrapB.style.transition = "all 0.4s cubic-bezier(0.45, 0.05, 0.55, 0.95)";

                // 위아래로 살짝 엇갈리게 교차 (곡선 느낌)
                wrapA.style.zIndex = "10";
                wrapB.style.zIndex = "5";
                
                const midPoint = (leftCoords[posA] + leftCoords[posB]) / 2;
                
                // 실제 이동
                wrapA.style.left = `${leftCoords[posB]}px`;
                wrapB.style.left = `${leftCoords[posA]}px`;

                // 데이터 업데이트
                currentPositions[idA] = posB;
                currentPositions[idB] = posA;

                setTimeout(resolve, 400);
            });
        }

        function handleCupClick(index) {
            if (!gameActive || isMoving) return;
            gameActive = false;

            const isCorrect = (index === ketchupIndex);
            
            // 모든 컵 열기
            for(let i=0; i<3; i++) {
                const cup = document.getElementById(`cup-${i}`);
                const ketchup = document.getElementById(`ketchup-${i}`);
                ketchup.style.display = "block";
                cup.style.transform = "translateY(-120px)";
            }

            setTimeout(() => {
                showResult(isCorrect);
            }, 600);
        }

        function showResult(isHit) {
            const modal = document.getElementById('result-modal');
            const title = document.getElementById('result-title');
            const text = document.getElementById('result-text');

            modal.style.display = "flex";

            if (isHit) {
                title.innerText = "🍅 당첨!!";
                title.style.color = "var(--primary-red)";
                text.innerText = "축하합니다! 케첩은 당신의 것입니다. (친구: 휴...)";
            } else {
                title.innerText = "💨 세이프!";
                title.style.color = "#4caf50";
                text.innerText = "운이 좋군요! 케첩을 피했습니다. (친구: 젠장!)";
            }
        }

        function closeModal() {
            document.getElementById('result-modal').style.display = "none";
            setStatus("한 번 더?");
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
    </script>
</body>
</html>
