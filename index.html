<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>3D 케첩 운명의 장난</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: 'Pretendard', sans-serif; }
        #ui { position: absolute; top: 20px; width: 100%; text-align: center; z-index: 10; pointer-events: none; }
        h1 { color: #ff4444; text-shadow: 0 0 10px rgba(0,0,0,0.5); margin-bottom: 10px; }
        #status { color: white; font-size: 1.5rem; margin-bottom: 20px; }
        button { 
            padding: 12px 30px; font-size: 1.2rem; cursor: pointer; 
            background: #d32f2f; color: white; border: none; border-radius: 50px;
            pointer-events: auto; transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 15px rgba(211, 47, 47, 0.4);
        }
        button:hover { background: #ff5252; transform: scale(1.05); }
        button:disabled { background: #555; cursor: not-allowed; }
        #canvas-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

    <div id="ui">
        <h1>🍅 KETCHUP ROULETTE 3D 🍅</h1>
        <div id="status">준비되면 버튼을 누르세요!</div>
        <button id="start-btn">섞기 시작!</button>
    </div>
    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/Tween.min.js"></script>

    <script>
        let scene, camera, renderer, cups = [], ketchup;
        let isShuffling = false, gameActive = false;
        let ketchupPos = 1; // 0, 1, 2 중 하나

        const cupColors = [0xff9800, 0xff9800, 0xff9800];
        const positions = [-4, 0, 4];

        init();
        animate();

        function init() {
            // Scene & Camera
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a1a);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 10);
            camera.lookAt(0, 1, 0);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);
            const spotLight = new THREE.SpotLight(0xffffff, 1);
            spotLight.position.set(0, 15, 10);
            spotLight.castShadow = true;
            scene.add(spotLight);

            // Floor
            const floorGeo = new THREE.PlaneGeometry(20, 20);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            // Ketchup Model (단순화된 병 모양)
            const kGroup = new THREE.Group();
            const bodyGeo = new THREE.CylinderGeometry(0.5, 0.5, 1.5, 32);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0xd32f2f });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            const capGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.4, 32);
            const capMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const cap = new THREE.Mesh(capGeo, capMat);
            cap.position.y = 0.9;
            kGroup.add(body, cap);
            ketchup = kGroup;
            scene.add(ketchup);

            // Cups
            for (let i = 0; i < 3; i++) {
                const cupGroup = new THREE.Group();
                const cupGeo = new THREE.CylinderGeometry(1.2, 1, 2.5, 32, 1, true);
                const cupMat = new THREE.MeshStandardMaterial({ color: 0xff9800, side: THREE.DoubleSide });
                const cupMesh = new THREE.Mesh(cupGeo, cupMat);
                
                const topGeo = new THREE.CircleGeometry(1.2, 32);
                const topMesh = new THREE.Mesh(topGeo, cupMat);
                topMesh.rotation.x = -Math.PI / 2;
                topMesh.position.y = 1.25;

                cupGroup.add(cupMesh, topMesh);
                cupGroup.position.set(positions[i], 1.25, 0);
                cupGroup.castShadow = true;
                cupGroup.userData = { id: i };
                cups.push(cupGroup);
                scene.add(cupGroup);
            }

            // Raycaster for clicking
            window.addEventListener('mousedown', onMouseDown);
            document.getElementById('start-btn').addEventListener('click', startGame);
        }

        async function startGame() {
            if (isShuffling) return;
            isShuffling = true;
            gameActive = false;
            document.getElementById('status').innerText = "케첩 확인 중...";
            document.getElementById('start-btn').disabled = true;

            // 1. 모든 컵 올리기 (케첩 위치 보여주기)
            ketchupPos = Math.floor(Math.random() * 3);
            ketchup.position.set(positions[ketchupPos], 0.75, 0);
            ketchup.visible = true;

            await liftCups(2.5);
            await new Promise(r => setTimeout(r, 800));
            await liftCups(0); // 다시 닫기
            
            document.getElementById('status').innerText = "섞습니다! 눈 크게 뜨세요!";
            
            // 2. 섞기 (10회 무작위 교차)
            for (let i = 0; i < 12; i++) {
                await shuffleStep();
            }

            isShuffling = false;
            gameActive = true;
            document.getElementById('status').innerText = "케첩이 든 컵을 고르세요!";
        }

        function liftCups(height) {
            return new Promise(resolve => {
                cups.forEach((cup, i) => {
                    new TWEEN.Tween(cup.position)
                        .to({ y: height + 1.25 }, 500)
                        .easing(TWEEN.Easing.Quadratic.Out)
                        .onComplete(() => { if(i===0) resolve(); })
                        .start();
                });
            });
        }

        function shuffleStep() {
            return new Promise(resolve => {
                const idx1 = Math.floor(Math.random() * 3);
                let idx2 = Math.floor(Math.random() * 3);
                while (idx1 === idx2) idx2 = Math.floor(Math.random() * 3);

                const pos1 = cups[idx1].position.x;
                const pos2 = cups[idx2].position.x;

                // 궤적을 그리며 섞기 (Arc)
                new TWEEN.Tween(cups[idx1].position)
                    .to({ x: pos2 }, 300)
                    .easing(TWEEN.Easing.Quadratic.InOut)
                    .start();

                new TWEEN.Tween(cups[idx2].position)
                    .to({ x: pos1 }, 300)
                    .easing(TWEEN.Easing.Quadratic.InOut)
                    .onComplete(resolve)
                    .start();
                
                // 케첩이 있는 컵의 위치도 추적
                if (ketchupPos === idx1) ketchupPos = -100; // 이동 중 임시값
                else if (ketchupPos === idx2) ketchupPos = -200;

                setTimeout(() => {
                    if (ketchupPos === -100) ketchupPos = idx2;
                    else if (ketchupPos === -200) ketchupPos = idx1;
                    ketchup.position.x = cups[ketchupPos].position.x;
                }, 150);
            });
        }

        function onMouseDown(event) {
            if (!gameActive) return;

            const mouse = new THREE.Vector2();
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(cups, true);

            if (intersects.length > 0) {
                let selectedCup = intersects[0].object;
                while(selectedCup.parent !== scene) selectedCup = selectedCup.parent;
                
                revealResult(selectedCup);
            }
        }

        function revealResult(selectedCup) {
            gameActive = false;
            const isWinner = (cups.indexOf(selectedCup) === ketchupPos);

            // 모든 컵 들기
            cups.forEach(cup => {
                new TWEEN.Tween(cup.position)
                    .to({ y: 4 }, 600)
                    .easing(TWEEN.Easing.Elastic.Out)
                    .start();
            });

            if (isWinner) {
                document.getElementById('status').innerText = "💥 당첨! 케첩은 당신의 것!";
                document.getElementById('status').style.color = "#ff4444";
            } else {
                document.getElementById('status').innerText = "세이프! 운이 좋으시네요.";
                document.getElementById('status').style.color = "#44ff44";
            }

            document.getElementById('start-btn').disabled = false;
            document.getElementById('start-btn').innerText = "복수하기 (다시 시작)";
        }

        function animate(time) {
            requestAnimationFrame(animate);
            TWEEN.update(time);
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
