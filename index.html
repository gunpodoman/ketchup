<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>운명의 케첩 야바위</title>
    <style>
        :root {
            --primary-red: #d32f2f;
            --accent-orange: #ff9800;
            --bg-dark: #1a1a1a;
            --text-light: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--bg-dark);
            font-family: 'Pretendard', sans-serif;
            color: var(--text-light);
            overflow: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
            z-index: 10;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0;
            color: var(--primary-red);
            text-shadow: 0 0 20px rgba(211, 47, 47, 0.5);
        }

        #status {
            font-size: 1.2rem;
            margin-top: 15px;
            height: 1.5em;
            color: #ddd;
            font-weight: 500;
        }

        .game-container {
            position: relative;
            width: 600px;
            height: 350px;
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            padding-bottom: 50px;
        }

        .cup-wrapper {
            position: absolute;
            bottom: 50px;
            width: 120px;
            height: 160px;
            cursor: pointer;
            z-index: 5;
            transition: left 0.35s ease-in-out;
        }

        .cup {
            position: relative;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #fbc02d 0%, #f9a825 100%);
            border-radius: 60px 60px 15px 15px;
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.2), 
                        0 10px 20px rgba(0,0,0,0.4);
            z-index: 2;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .cup::after {
            content: '';
            position: absolute;
            top: 20px;
            left: 15%;
            width: 70%;
            height: 15px;
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
        }

        .ketchup {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 80px;
            background: #d32f2f;
            border-radius: 8px 8px 4px 4px;
            display: none;
            z-index: 1;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .ketchup::before {
            content: 'TOMATO';
            position: absolute;
            top: 30px;
            width: 100%;
            text-align: center;
            font-size: 8px;
            font-weight: bold;
            color: white;
        }

        .ketchup-cap {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 15px;
            background: #fff;
            border-radius: 3px;
        }

        .controls {
            margin-top: 50px;
            z-index: 10;
        }

        button {
            background-color: var(--primary-red);
            color: white;
            border: none;
            padding: 15px 45px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(211, 47, 47, 0.4);
        }

        button:hover {
            background-color: #f44336;
            transform: translateY(-2px);
        }

        button:disabled {
            background-color: #444;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        /* 컵이 열린 상태의 스타일 */
        .cup.open {
            transform: translateY(-130px) rotate(-5deg);
        }

        /* 이미 고른 컵은 클릭 불가 */
        .cup-wrapper.disabled {
            cursor: default;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🍅 KETCHUP SHUFFLE 🍅</h1>
        <div id="status">공정한 순번 정하기</div>
    </div>

    <div class="game-container" id="game-container">
        <div class="cup-wrapper" id="wrapper-0" style="left: 50px;" onclick="handleCupClick(0)">
            <div class="ketchup" id="ketchup-0"><div class="ketchup-cap"></div></div>
            <div class="cup" id="cup-0"></div>
        </div>
        <div class="cup-wrapper" id="wrapper-1" style="left: 240px;" onclick="handleCupClick(1)">
            <div class="ketchup" id="ketchup-1"><div class="ketchup-cap"></div></div>
            <div class="cup" id="cup-1"></div>
        </div>
        <div class="cup-wrapper" id="wrapper-2" style="left: 430px;" onclick="handleCupClick(2)">
            <div class="ketchup" id="ketchup-2"><div class="ketchup-cap"></div></div>
            <div class="cup" id="cup-2"></div>
        </div>
    </div>

    <div class="controls">
        <button id="start-btn" onclick="initGame()">게임 시작</button>
    </div>

    <script>
        let ketchupIndex = -1;
        let isMoving = false;
        let gameActive = false;
        let clickCount = 0; 
        let currentPositions = [0, 1, 2];
        const leftCoords = [50, 240, 430];
        let chosenIndices = [];

        function setStatus(msg, color = "#ddd") {
            const status = document.getElementById('status');
            status.innerText = msg;
            status.style.color = color;
        }

        async function initGame() {
            if (isMoving) return;
            gameActive = false;
            clickCount = 0;
            chosenIndices = [];
            document.getElementById('start-btn').disabled = true;
            
            resetCups();
            
            // 처음에는 랜덤 위치 노출
            ketchupIndex = Math.floor(Math.random() * 3);
            
            setStatus("케첩의 위치를 확인하세요.");
            await liftCup(ketchupIndex, true, true); 
            await sleep(1000);
            await liftCup(ketchupIndex, false);
            await sleep(300);

            setStatus("컵을 무작위로 섞습니다...");
            await startShuffle();

            setStatus("첫 번째 분, 컵 하나를 선택하세요.", "#ff9800");
            gameActive = true;
        }

        function resetCups() {
            for(let i=0; i<3; i++) {
                const wrapper = document.getElementById(`wrapper-${i}`);
                const cup = document.getElementById(`cup-${i}`);
                const ketchup = document.getElementById(`ketchup-${i}`);
                
                wrapper.classList.remove('disabled');
                cup.classList.remove('open');
                cup.style.transform = "";
                ketchup.style.display = "none";
            }
        }

        function liftCup(index, isUp, forceShow = false) {
            return new Promise(resolve => {
                const cup = document.getElementById(`cup-${index}`);
                const ketchup = document.getElementById(`ketchup-${index}`);
                
                if (isUp) {
                    if (forceShow || index === ketchupIndex) {
                        ketchup.style.display = "block";
                    } else {
                        ketchup.style.display = "none";
                    }
                    cup.classList.add('open');
                } else {
                    cup.classList.remove('open');
                    setTimeout(() => { 
                        if (!cup.classList.contains('open')) {
                            ketchup.style.display = "none"; 
                        }
                    }, 400);
                }
                
                setTimeout(resolve, 600);
            });
        }

        async function startShuffle() {
            isMoving = true;
            const shuffleCount = 12;
            for (let i = 0; i < shuffleCount; i++) {
                let posA = Math.floor(Math.random() * 3);
                let posB = Math.floor(Math.random() * 3);
                while (posA === posB) posB = Math.floor(Math.random() * 3);
                await swapCups(posA, posB);
            }
            isMoving = false;
        }

        function swapCups(posA, posB) {
            return new Promise(resolve => {
                const idA = currentPositions.indexOf(posA);
                const idB = currentPositions.indexOf(posB);
                const wrapA = document.getElementById(`wrapper-${idA}`);
                const wrapB = document.getElementById(`wrapper-${idB}`);

                wrapA.style.zIndex = "10";
                wrapB.style.zIndex = "5";
                
                wrapA.style.left = `${leftCoords[posB]}px`;
                wrapB.style.left = `${leftCoords[posA]}px`;

                currentPositions[idA] = posB;
                currentPositions[idB] = posA;
                setTimeout(resolve, 360);
            });
        }

        async function handleCupClick(index) {
            if (!gameActive || isMoving || chosenIndices.includes(index)) return;
            
            gameActive = false;
            clickCount++;
            chosenIndices.push(index);
            document.getElementById(`wrapper-${index}`).classList.add('disabled');

            if (clickCount === 1) {
                // 첫 번째 클릭: 무조건 빈 컵
                if (index === ketchupIndex) {
                    let others = [0, 1, 2].filter(i => i !== index);
                    ketchupIndex = others[Math.floor(Math.random() * others.length)];
                }
                
                await liftCup(index, true, false); 
                setStatus("빈 컵입니다! 다음 분, 남은 컵 중에 선택하세요.", "#4caf50");
                
                await sleep(500);
                gameActive = true; // 컵을 닫지 않고 그대로 진행
            } else if (clickCount === 2) {
                // 두 번째 클릭: 무조건 당첨
                ketchupIndex = index;
                
                await liftCup(index, true, true); 
                setStatus("당첨입니다! 케첩은 당신의 것입니다!", "var(--primary-red)");
                
                document.getElementById('start-btn').disabled = false;
                document.getElementById('start-btn').innerText = "다시 하기";
            }
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
    </script>
</body>
</html>
